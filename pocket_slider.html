<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    body {
  background: #f5f5f5;
  font-family: Arial, sans-serif;
}

.mySlider {
  width: 80%;
  margin: 50px auto;
}


.card {
  position: relative;
  border-radius: 25px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  display: block;
}

/* Dark overlay */
.overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: #fff;
}

.overlay h3 {
  margin: 0;
  font-size: 22px;
  font-weight: bold;
}

.overlay p {
  margin: 5px 0 0;
  font-size: 14px;
}

/* Curve style like your image */
.card::before,
.card::after {
  content: "";
  position: absolute;
  width: 60px;
  height: 60px;
  background: #f5f5f5;
  border-radius: 50%;
}

.card::before {
  top: -30px;
  right: -30px;
}

.card::after {
  bottom: -30px;
  left: -30px;
}

/* Navigation arrows */
.swiper-button-next,
.swiper-button-prev {
  color: #c89b5e;
}

  </style>
</head>
<body>
  

<div class="swiper mySlider">
  <div class="swiper-wrapper">

    <div class="swiper-slide">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" />
        <div class="overlay">
          <h3>LUGGAGE HANDLING</h3>
          <p>Personalized luggage handling by trained staff</p>
        </div>
      </div>
    </div>

    <div class="swiper-slide">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" />
        <div class="overlay">
          <h3>CAR SERVICE</h3>
          <p>Premium travel experience</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Navigation -->
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
var swiper = new Swiper(".mySlider", {
  slidesPerView: 1,
  spaceBetween: 20,
  loop: true,
  centeredSlides: true,
autoflow: true,
  navigation: {
    nextEl: ".swiper-button-next",
    prevEl: ".swiper-button-prev",
  },
});
</script>
</body>
</html>
